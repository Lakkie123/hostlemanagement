{% extends 'hostel_app/admin/base_admin.html' %}
{% block title %}{{ title }} — HostelHub{% endblock %}
{% block admin_content %}

<div class="page-header fade-in">
    <div>
        <div class="page-title">{{ title }}</div>
        <div class="page-subtitle">Create a notice for students</div>
    </div>
    <a href="{% url 'manage_notices' %}" class="btn btn-outline btn-sm"><i class="fa-solid fa-arrow-left"></i> Back</a>
</div>

<div class="card fade-in fade-in-delay-1" style="max-width:700px;">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label">Title *</label>
                {{ form.title }}
            </div>
            <div class="form-group">
                <label class="form-label">Content *</label>
                {{ form.content }}
            </div>
            <div class="form-grid">
                <div class="form-group">
                    <label class="form-label">Category *</label>
                    {{ form.category }}
                </div>
                <div class="form-group">
                    <label class="form-label">Expires At (Optional)</label>
                    {{ form.expires_at }}
                </div>
            </div>
            <div class="form-group">
                <label class="form-check">
                    {{ form.is_active }}
                    <span>Active (visible to students)</span>
                </label>
            </div>
            <div style="display:flex;gap:12px;">
                <button type="submit" class="btn btn-gold"><i class="fa-solid fa-bullhorn"></i> {{ title }}</button>
                <a href="{% url 'manage_notices' %}" class="btn btn-outline">Cancel</a>
            </div>
        </form>
    </div>
</div>

{% endblock %}
